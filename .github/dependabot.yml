# Keep the SHA-pinned reusable-workflow refs fresh. The only github-actions dependency in
# this repo is our own bitwise-media-group/github-workflows (the merge / release / notice
# pipelines), so there is nothing to wait on — no cooldown — and bumps ship as `ci`:
# CI/automation changes that release-please ignores, so a pin bump never cuts a release of
# this repo (see CONTRIBUTING.md "Commit messages").
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    commit-message:
      prefix: ci
      include: scope
    groups:
      bitwise-media-group:
        patterns:
          - bitwise-media-group/*
