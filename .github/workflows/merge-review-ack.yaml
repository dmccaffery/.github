# Companion to merge.yaml — completes on an approving review purely so its
# workflow_run(completed) fires in the base-repo context, where merge.yaml mints the App
# token and retries the fast-forward. This is what lets a fork-PR approval (which carries
# no secrets) complete the auto-merge; harmless for same-repo PRs. Its name "Merge Review
# Ack" must stay in merge.yaml's workflow_run.workflows list.
#
# Pinned to a full commit SHA on the v4 line (the trailing "# v4.0.0" is the human-readable
# tag) — see the github-workflows README "Pinning".

name: Merge Review Ack

on:
  pull_request_review:
    types: [submitted]

# does no privileged work; grants nothing
permissions: {}

jobs:
  ack:
    uses: bitwise-media-group/github-workflows/.github/workflows/merge-review-ack.yaml@2f3418bdbc1e4c51b0504b736a75d66f09bebe6a # v4.1.0
