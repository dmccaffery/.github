# Continuous integration — thin caller for the org's reusable ci workflow (v5+:
# mise-task aware). It discovers the canonical tasks this repo defines via
# `mise tasks ls --name-only` and runs `make <target>` for each — here only
# `lint` (addlicense + prettier + markdownlint + actionlint via the markdown-lib
# archetype); build and test don't exist in this archetype and are skipped. The
# pinned tooling installs via mise from the toolchain submodule at .mise/.
#
# Pinned to a full commit SHA (tag in the comment); Dependabot keeps it fresh.
name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:

# the reusable workflow's jobs only need contents:read; grant just that ceiling
permissions:
  contents: read

jobs:
  ci:
    uses: bitwise-media-group/github-workflows/.github/workflows/ci.yaml@3636c830f0b00c591f8b27401c45786d08466f18 # v6.0.0
    with:
      # nothing to unit-test here (no test task), so skip the Codecov upload
      coverage: false
