# Release pipeline — runs release-please (release-type: simple) on every push to main,
# maintaining a release PR and, when it merges, cutting the GitHub release and tag.
# This repo ships no .goreleaser.yaml, so the reusable workflow takes the publish path:
# `make build` (a no-op here) then a vacuous `git diff -- dist` (there is no dist/).
#
# Requires release-please-config.json + .release-please-manifest.json and a Makefile
# `build` target — all added alongside this file. Releases are cut from feat:/fix:
# commits; docs:/chore: commits don't bump the version.
#
# Pinned to a full commit SHA on the v4 line (the trailing "# v4.0.0" is the human-readable
# tag). To track a floating major (@v4) or a release tag (@v4.0.0) instead, see the
# github-workflows README "Pinning".

name: Release

on:
  push:
    branches: [main]

# Ceiling for the reusable workflow. GitHub resolves a reusable workflow's permissions
# statically as the union of every job and ignores `if:`, so the skipped goreleaser job's
# id-token / attestations / artifact-metadata AND the skipped docs job's pages: write must
# still be granted here or the whole run startup-fails — even though no executed job
# realises them (this repo ships neither .goreleaser.yaml nor zensical.toml).
permissions:
  contents: write # create the release/tag and upload assets
  issues: write # release-please labels via the issues api
  pull-requests: write # release-please opens the release PR
  id-token: write # cosign keyless signing (goreleaser job) + Pages deploy (docs job)
  attestations: write # build-provenance attestation (goreleaser job)
  artifact-metadata: write # attestation storage record (goreleaser job)
  pages: write # publish Zensical docs to GitHub Pages (docs job)

jobs:
  release:
    uses: bitwise-media-group/github-workflows/.github/workflows/release.yaml@2f3418bdbc1e4c51b0504b736a75d66f09bebe6a # v4.1.0
    with:
      # Author the release PR as the "FF Merge" App so its branch push emits
      # workflow_run events — that lets the auto-merge in merge.yaml retrigger when the
      # release PR's checks go green. A GITHUB_TOKEN-authored push is silenced by
      # GitHub's recursion guard, so the PR would otherwise only merge on the hourly sweep.
      app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
    secrets:
      app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
