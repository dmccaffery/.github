name: 🐛 Bug report
description: Report something that isn't working as it should.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug — a clear, reproducible report is the
        fastest route to a fix.

        - **Search first.** Please check this repository's existing issues before filing a
          new one, in case it's already been reported.
        - **Not for security.** Never report a vulnerability in a public issue — use the
          repository's **Security** tab → _Report a vulnerability_ (see our
          [security policy](https://github.com/bitwise-media-group/.github/security/policy)).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you observe? Include the actual behaviour and any error output or logs.
      placeholder: When I run …, it …
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The exact steps that trigger the problem, so we can see it too.
      placeholder: |
        1. Go to …
        2. Run …
        3. See error …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: The release tag or commit SHA where you saw this.
      placeholder: v1.2.3 or a1b2c3d
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, runtime, and any other versions relevant to the problem.
      placeholder: macOS 15.2, Node 22.3, …
  - type: checkboxes
    id: confirmations
    attributes:
      label: Before you submit
      options:
        - label: I've searched this repository's existing issues and this isn't a duplicate.
          required: true
        - label: This is not a security vulnerability (those go privately, via the Security tab).
          required: true
