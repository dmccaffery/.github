name: ✨ Feature request
description: Suggest a new feature or an improvement to an existing one.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! To help us find the best approach, **describe the problem you're
        trying to solve, not just the solution you have in mind** — that gives us room to work
        it out together.

        Please search this repository's existing issues first, in case someone has already
        proposed something similar.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do, and what gets in the way today? Why does it matter?
      placeholder: I'm trying to … but …
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: If you have a shape in mind, describe it. Optional — the problem above matters most.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've weighed, and why they fall short.
  - type: checkboxes
    id: confirmations
    attributes:
      label: Before you submit
      options:
        - label: I've searched this repository's existing issues and this isn't a duplicate.
          required: true
        - label: I'm open to discussing the design before any code is written.
          required: true
