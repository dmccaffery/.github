# The org-level .github repo consumes the shared toolchain
# (bitwise-media-group/toolchain) as the .mise/ submodule: pinned tools + the
# markdown-lib task archetype come from there (prose + license lint; nothing to
# build or test), and the Makefile is a thin forwarder (.mise/mise.mk).
[task_config]
includes = [".mise/tasks/markdown-lib.toml"]
